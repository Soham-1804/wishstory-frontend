[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/how-it-works"
  to = "/how-it-works.html"
  status = 200

[[redirects]]
  from = "/faq"
  to = "/faq.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

# Catch-all for React SPA — must come LAST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200